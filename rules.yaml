goal:
  free_percentage: 10
  dry_run: true

constraints:
  protected_tag: exempt
  min_age_days: 30

ordering:
  - field: added
    direction: desc
  - field: size_gb
    direction: desc
  - field: last_watched
    direction: desc

thresholds:
  skip_if_smaller_than_gb: 1
  notify_if_larger_than_gb: 20
  notify_if_lib_size_dif_larger_than_gb: 300 # accounts for file system